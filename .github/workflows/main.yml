name: 'publish'

on:
  workflow_dispatch:
  push:
    branches:
      - release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Windows and Linux → GitHub Releases
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: install frontend dependencies
        run: npm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: filera-v__VERSION__
          releaseName: 'filera v__VERSION__'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  # macOS → App Store Connect (Apple Distribution cert, no notarization)
  publish-macos-appstore:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch: aarch64
          - target: x86_64-apple-darwin
            arch: x86_64
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: install frontend dependencies
        run: npm install

      - name: Import certificates
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          MAC_INSTALLER_CERTIFICATE: ${{ secrets.MAC_INSTALLER_CERTIFICATE }}
          MAC_INSTALLER_CERTIFICATE_PASSWORD: ${{ secrets.MAC_INSTALLER_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 20)
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import Apple Distribution cert (signs the .app)
          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o $RUNNER_TEMP/apple_dist.p12
          security import $RUNNER_TEMP/apple_dist.p12 \
            -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH

          # Import 3rd Party Mac Developer Installer cert (signs the .pkg)
          echo -n "$MAC_INSTALLER_CERTIFICATE" | base64 --decode -o $RUNNER_TEMP/mac_installer.p12
          security import $RUNNER_TEMP/mac_installer.p12 \
            -P "$MAC_INSTALLER_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH

          security list-keychain -d user -s $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

      - name: Build app
        # No APPLE_ID/APPLE_PASSWORD/APPLE_TEAM_ID = no notarization attempt
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: npm run tauri build -- --target ${{ matrix.target }}

      - name: Create installer package
        run: |
          APP_PATH="src-tauri/target/${{ matrix.target }}/release/bundle/macos/filera.app"

          xcrun productbuild \
            --component "$APP_PATH" /Applications \
            --sign "3rd Party Mac Developer Installer: Jonathan Corriveau (46T87AFCFB)" \
            filera-${{ matrix.arch }}.pkg

      - name: Get version from tauri config
        id: get_version
        run: |
          VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Upload to App Store Connect
        env:
          APP_STORE_API_KEY_ID: ${{ secrets.APP_STORE_API_KEY_ID }}
          APP_STORE_API_KEY_P8: ${{ secrets.APP_STORE_API_KEY_P8 }}
          APP_STORE_ISSUER_ID: ${{ secrets.APP_STORE_ISSUER_ID }}
          APP_STORE_APPLE_ID: ${{ secrets.APP_STORE_APPLE_ID }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo -n "$APP_STORE_API_KEY_P8" | base64 --decode \
            > ~/.appstoreconnect/private_keys/AuthKey_${APP_STORE_API_KEY_ID}.p8

          xcrun altool \
            --upload-package filera-${{ matrix.arch }}.pkg \
            --type macos \
            --apple-id "$APP_STORE_APPLE_ID" \
            --bundle-id "com.joncorv.filera" \
            --bundle-version "${{ steps.get_version.outputs.version }}" \
            --bundle-short-version-string "${{ steps.get_version.outputs.version }}" \
            --apiKey "$APP_STORE_API_KEY_ID" \
            --apiIssuer "$APP_STORE_ISSUER_ID" \
            --verbose

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain $KEYCHAIN_PATH || true

  build-nix:
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v24
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Setup Cachix
        uses: cachix/cachix-action@v14
        with:
          name: filera
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Build with Nix
        run: |
          nix build --print-build-logs

      - name: Check build output
        run: |
          ls -la result/bin/

      - name: Get version from Cargo.toml
        id: get_version
        run: |
          VERSION=$(grep '^version = ' src-tauri/Cargo.toml | head -1 | cut -d '"' -f 2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Package NixOS binary
        run: |
          mkdir -p nixos-release
          cp -L result/bin/filera nixos-release/filera-${{ steps.get_version.outputs.version }}-x86_64-linux

      - name: Upload to existing release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: filera-v${{ steps.get_version.outputs.version }}
          files: nixos-release/*
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
